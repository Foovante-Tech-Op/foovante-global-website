<div class="map-wrap">
  <div #mapEl class="leaflet-map"></div>

  <!-- Legend -->
  <div class="map-overlay">
    <h4>Project types</h4>
    <div class="legend">
      <div><i style="background:#2D6A4F"></i> Forestry / REDD+</div>
      <div><i style="background:#D4870A"></i> Energy / Solar</div>
      <div><i style="background:#5C7259"></i> Agriculture</div>
      <div><i style="background:#4A4A5A"></i> Waste / Biogas</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="map-stats">
    <div class="map-stat"><div class="n">282</div><div class="l">Active projects</div></div>
    <div class="map-stat"><div class="n">14</div><div class="l">Countries</div></div>
  </div>
</div>
